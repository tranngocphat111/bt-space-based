server.port=8080

# Product Service
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://192.168.1.164:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[0].filters[0]=RemoveRequestHeader=Origin

# Cart Service
spring.cloud.gateway.routes[1].id=cart-service
spring.cloud.gateway.routes[1].uri=http://192.168.1.67:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[1].filters[0]=RemoveRequestHeader=Origin

# Order Service
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://192.168.1.69:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/checkout/**,/api/orders/**
spring.cloud.gateway.routes[2].filters[0]=RemoveRequestHeader=Origin

# Inventory Service
spring.cloud.gateway.routes[3].id=inventory-service
spring.cloud.gateway.routes[3].uri=http://192.168.1.65:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/stock/**
spring.cloud.gateway.routes[3].filters[0]=RemoveRequestHeader=Origin

management.endpoints.web.exposure.include=health,info

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].add-to-simple-url-handler-mapping=true

logging.level.org.springframework.cloud.gateway=DEBUG